<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexVision | Judicial CVA Pipeline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; color: #334155; }
        .navbar { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .navbar-brand { font-weight: 700; color: #0f172a !important; letter-spacing: -0.5px; }
        .card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .btn-primary { background: #2563eb; border: none; font-weight: 600; padding: 10px 24px; border-radius: 8px; }
        .btn-primary:hover { background: #1d4ed8; }
        footer { font-size: 0.9rem; color: #64748b; }
    </style>
</head>
<body>

    <nav class="navbar sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check text-primary"></i> LexVision
            </a>
            <span class="navbar-text d-none d-md-block">
                CVA Pipeline v1.0 | April 2026 Demo
            </span>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-5 mt-5">
        <div class="container">
            <hr class="mb-4">
            <p>&copy; 2026 NMIMS MPSTME | CVA Project: LexVision</p>
            <p class="small">Chaitanya Thakur & Bharat Baswan</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
